      .spin {
        border: 5px solid red;
        border-top: 5px solid white;
        border-left: 5px solid white;
        width: 30px;
        height: 30px;
        border-radius: 50px;
        animation: spinner 1s linear;
        animation-iteration-count: infinite;
      }
      .card {
        padding: 10px;
        width: 270px;
        min-height: 300px;
        border: 2px solid grey;

        from {
          transform: rotate(0deg);
        }
        to {
